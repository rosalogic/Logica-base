<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz de Lógica</title>

  <style>
    body {
      background-image: url("https://tse1.mm.bing.net/th/id/OIP.Gnsw_nYAdD87njX6CPchwQHaD4?rs=1&pid=ImgDetMain&o=7&rm=3");
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      margin: 0;
      padding: 0;
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      max-width: 500px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      background: #38bdf8;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .score {
      font-size: 16px;
      margin-bottom: 10px;
      color: #a5f3fc;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Quiz de Lógica</h1>

  <div class="score">
    Pontuação: <span id="score">0</span>
  </div>

  <h2 id="question">Carregando...</h2>

  <button onclick="answer(true)">Verdadeiro</button>
  <button onclick="answer(false)">Falso</button>

  <div id="result" class="result"></div>

  <br>
  <button onclick="nextQuestion()">Próxima pergunta</button>
</div>

<script>
  let score = 0;
  let currentAnswer = false;

  const questions = [
    { text: "TRUE AND FALSE é TRUE?", answer: false },
    { text: "TRUE OR FALSE é TRUE?", answer: true },
    { text: "NOT TRUE é FALSE?", answer: true },
    { text: "TRUE AND TRUE é TRUE?", answer: true },
    { text: "FALSE OR FALSE é TRUE?", answer: false }
  ];

  function loadQuestion() {
    let q = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("question").innerText = q.text;
    currentAnswer = q.answer;
    document.getElementById("result").innerText = "";
  }

  function answer(userAnswer) {
    if (userAnswer === currentAnswer) {
      document.getElementById("result").innerText = "✔ Correto!";
      score++;
    } else {
      document.getElementById("result").innerText = "❌ Errado!";
    }

    document.getElementById("score").innerText = score;
  }

  function nextQuestion() {
    loadQuestion();
  }

  loadQuestion();
</script>

</body>
</html>
