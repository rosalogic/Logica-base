<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lógica Interativa V2</title>

  <style>
    body {
      background: linear-gradient(to right, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      backdrop-filter: blur(5px);
    }

    button, select {
      margin: 5px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button {
      background: #38bdf8;
      color: black;
    }

    .result {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .score {
      color: #a5f3fc;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔢 Lógica Booleana Interativa</h1>

  <!-- TEORIA -->
  <div class="card">
    <h2>📚 Conceitos</h2>
    <p><b>AND</b> → só V se tudo for V</p>
    <p><b>OR</b> → V se pelo menos um for V</p>
    <p><b>NOT</b> → inverte V ↔ F</p>
  </div>

  <!-- CALCULADORA -->
  <div class="card">
    <h2>🧮 Calculadora</h2>

    <select id="a">
      <option value="V">V</option>
      <option value="F">F</option>
    </select>

    <select id="op">
      <option value="AND">AND</option>
      <option value="OR">OR</option>
    </select>

    <select id="b">
      <option value="V">V</option>
      <option value="F">F</option>
    </select>

    <br>

    <button onclick="calc()">Calcular</button>

    <div id="calcResult" class="result"></div>
  </div>

  <!-- QUIZ -->
  <div class="card">
    <h2>🎮 Quiz</h2>

    <p id="question">...</p>

    <button onclick="answer('V')">Sim (V)</button>
    <button onclick="answer('F')">Não (F)</button>

    <div id="quizResult" class="result"></div>

    <p class="score">Pontuação: <span id="score">0</span></p>

    <button onclick="next()">Próxima pergunta</button>
  </div>

</div>

<script>

  // ---------------- CALCULADORA ----------------
  function calc() {
    let a = document.getElementById("a").value === "V";
    let b = document.getElementById("b").value === "V";
    let op = document.getElementById("op").value;

    let result = (op === "AND") ? (a && b) : (a || b);

    document.getElementById("calcResult").innerText =
      `Resultado: ${result ? "V" : "F"}`;
  }

  // ---------------- QUIZ ----------------
  let score = 0;
  let correct = "V";

  const questions = [
    { q: "V AND F = ?", a: "F" },
    { q: "V OR F = ?", a: "V" },
    { q: "NOT V = ?", a: "F" },
    { q: "F OR F = ?", a: "F" },
    { q: "V AND V = ?", a: "V" }
  ];

  function load() {
    let q = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("question").innerText = q.q;
    correct = q.a;
    document.getElementById("quizResult").innerText = "";
  }

  function answer(val) {
    if (val === correct) {
      document.getElementById("quizResult").innerText = "✔ Correto!";
      score++;
    } else {
      document.getElementById("quizResult").innerText = "❌ Errado!";
    }

    document.getElementById("score").innerText = score;
  }

  function next() {
    load();
  }

  load();

</script>

</body>
</html>
